version: "3.9"

services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: qyra-surrealdb
    command: start --log debug --user root --pass root memory
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Upstash Redis is cloud-hosted; for local dev use a local Redis instead
  redis:
    image: redis:7-alpine
    container_name: qyra-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
